<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Care Clinic - Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <aside>
        <div class="logo">
            <h3><img src="clinic.png" controls width="40" height="40">Bright Care clinic</h3>
        </div>
        <ul>
            <li><a href="index.html">📊 Dashboard</a></li>
            <li><a href="checkin.html" class="active">📝 Check-in</a></li>
            <li><a href="patients.html">👥 Patients</a></li>
            <li><a href="queue.html">⏳ Queue</a></li>
            <li><a href="appointments.html">📅 Appointments</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
            <li><a href="logout.html">🚪 Logout</a></li>
        </ul>
    </aside>

    <main>
        <div class="header">
            <h2>Patient Check-in</h2>
            <p>Register new patient or check-in existing patient</p>
        </div>

        <div class="checkin-container">
            <div class="form-box">
                <h3>Patient Information</h3>
                
                <div class="form-group">
                    <label>Full name *</label>
                    <input type="text" id="name" placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label>Age *</label>
                    <input type="number" id="age" placeholder="Enter age">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>Reason for visit</label>
                    <select id="reason">
                        <option value="General Checkup">General Checkup</option>
                        <option value="Emergency">Emergency</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Vaccination">Vaccination</option>
                        <option value="Lab Test">Lab Test</option>
                        <option value="Consultation">Consultation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Patient type</label>
                    <div class="radio-group">
                        <label><input type="radio" name="patientType" value="new"> New patient</label>
                        <label><input type="radio" name="patientType" value="returning"> Returning patient</label>
                    </div>
                </div>

                <button class="submit-btn" onclick="addPatient()">✅ Submit Check-in</button>
            </div>

            <div class="queue-summary">
                <h3>Current Queue Summary</h3>
                <div class="queue-stats">
                    <div class="mini-stat">
                        <span class="stat-number" id="queueWaiting">0</span>
                        <span>Waiting</span>
                    </div>
                    <div class="mini-stat">
                        <span class="stat-number" id="queueChecked">0</span>
                        <span>Checked In</span>
                    </div>
                </div>
                <a href="queue.html" class="view-queue-btn">View Full Queue →</a>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
